apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx # Имя объекта внутри namespace

spec:
  replicas: 2

  selector:
    matchLabels: # Имя по которому Deployment определяет свои поды
      app: nginx

  template: # Шаблон для создания контейнера
    metadata:
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx
          image: nginx:1.28-alpine

          ports:
            - name: http
              containerPort: 80

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          volumeMounts:
            - name: nginx-html
              mountPath: /usr/share/nginx/html
              readOnly: true

      volumes:
        - name: nginx-html
          configMap:
            name: nginx-html